<!DOCTYPE html>
<html>

<head>
    <!-- Meta, title, CSS, favicons, etc. -->
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="FFF Home">
    <meta name="keywords" content="Dmego,Homepage">
    <meta name="author" content="Dmego">
    <title>反反的小世界</title>
    <!-- 使用本地CSS文件替代CDN，减少网络请求 -->
    <link rel="stylesheet" type="text/css" href="./assets/css/onlinewebfonts.css"/>
    <link rel="stylesheet" type="text/css" href="./assets/css/vno.css">
    <link rel="stylesheet" type="text/css" href="./assets/css/iconfont.css">
    <link rel="apple-touch-icon" href="./assets/img/favicon.png">
    <link rel="icon" href="./assets/img/favicon.ico">
    <style>
        /* 隐藏移动端菜单按钮 */
        .mobile.btn-mobile-menu {
            display: none !important;
        }
        
        /* 设置自定义壁纸 */
        .panel-cover {
            background-image: url('./assets/img/bz.jpg') !important;
            background-size: cover !important;
            background-position: center !important;
            background-repeat: no-repeat !important;
        }
        
        /* 背景朦胧效果 */
        .panel-cover--overlay {
            opacity: 0.5 !important;
            background: rgba(0, 0, 0, 0.3) !important;
            backdrop-filter: blur(2px) !important;
            -webkit-backdrop-filter: blur(2px) !important;
        }
        
        /* 为背景添加额外的模糊层 */
        .panel-cover::before {
            content: '' !important;
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
            bottom: 0 !important;
            background: inherit !important;
            filter: blur(3px) brightness(0.7) !important;
            -webkit-filter: blur(3px) brightness(0.7) !important;
            z-index: -1 !important;
        }
        
        /* 头像和标题去除手指光标，导航按钮保持手指 */
        .panel-main__content > div a,
        .panel-main__content h1 a {
            cursor: default;
        }
        .navigation .navigation__item a {
            cursor: pointer;
        }
        
        /* 导航区域透明 */
        .navigation-wrapper {
            background: transparent !important;
        }
        .cover-navigation {
            background: transparent !important;
        }
        .navigation {
            background: transparent !important;
        }
        
        /* 隐藏导航区域后面的横线 */
        .navigation-wrapper + hr,
        .navigation-wrapper ~ hr {
            display: none !important;
        }
        
        /* 动画效果已移除 */
        
        /* 通用弹窗样式 */
        .qq-modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }
        .qq-modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            min-width: 300px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }
        .qq-id {
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 20px;
        }
        .qq-qr {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            border-radius: 15px;
            overflow: hidden;
        }
        .qq-qr img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .copy-btn {
            background-color: #07c160;
            color: white;
            border: none;
            padding: 8px 20px;
            font-size: 14px;
            border-radius: 5px;
            cursor: pointer;
        }
        .copy-btn:hover { background-color: #06ad56; }
        .close-modal {
            position: absolute;
            right: 15px;
            top: 15px;
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
        }
        .close-modal:hover { color: #ccc; }
        
        /* 工具弹窗按钮样式 */
        .tool-btn {
            display: inline-block;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.22);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            font-size: 14px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            text-align: center;
        }
        .tool-btn:hover {
            background: rgba(255, 255, 255, 0.38);
            border-color: rgba(255, 255, 255, 0.8);
            transform: scale(1.03);
        }
        
        /* ====== 博客弹窗样式 ====== */
        .blog-modal {
            display: none;
            position: fixed;
            z-index: 10000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.65);
            animation: fadeIn 0.3s ease;
        }
        .blog-modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90vw;
            max-width: 900px;
            height: 85vh;
            background: #1d1f21;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
        }
        .blog-modal-close {
            position: absolute;
            top: 10px;
            right: 14px;
            z-index: 10001;
            width: 30px;
            height: 30px;
            font-size: 22px;
            font-weight: bold;
            color: #888;
            cursor: pointer;
            line-height: 30px;
            text-align: center;
            transition: color 0.2s;
            background: none;
            border: none;
        }
        .blog-modal-close:hover {
            color: #fff;
        }
        .blog-modal-body {
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        .blog-modal-body iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .blog-modal-loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
            font-size: 14px;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        /* 博客弹窗响应式 */
        @media screen and (max-width: 768px) {
            .blog-modal-content {
                width: 96vw;
                height: 90vh;
                border-radius: 8px;
            }
        }
        
        /* 手机端强制显示所有内容 */
        @media screen and (max-width: 900px) {
            .panel-main__content {
                display: flex !important;
                flex-direction: column !important;
                align-items: center !important;
                justify-content: center !important;
                opacity: 1 !important;
                visibility: visible !important;
                position: relative !important;
                top: auto !important;
                text-align: center !important;
            }
            .navigation-wrapper {
                display: block !important;
                opacity: 1 !important;
                visibility: visible !important;
                margin-top: 0px !important;
                position: relative !important;
                top: auto !important;
                text-align: center !important;
            }
            .cover-navigation {
                opacity: 1 !important;
                visibility: visible !important;
                display: block !important;
                text-align: center !important;
            }
            .navigation {
                opacity: 1 !important;
                visibility: visible !important;
                display: flex !important;
                justify-content: center !important;
            }
            .navigation__item {
                opacity: 1 !important;
                visibility: visible !important;
                display: inline-block !important;
            }
            h1 {
                text-align: center !important;
            }
            .panel-cover__divider,
            hr {
                display: none !important;
            }
        }
    </style>
</head>

<body>
    <header id="panel" class="panel-cover">
        <div class="panel-main">
            <div class="panel-main__inner panel-inverted">
                <div class="panel-main__content">
                    <div style="margin-bottom: 30px;">            
                        <a href="#" title="" class="blog-button">
                            <div class="img"><img src="./assets/img/tx.jpg" alt="img" class="js-avatar profilepic"></div>
                        </a>
                    </div>
                    <h1 style="font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; font-weight: 600; font-size: 2em;">
                        <a href="#" title="Dmego Home">FFF</a>
                    </h1>
                    <hr class="panel-cover__divider" style="margin-bottom: 15px;" />
                    <div class="navigation-wrapper">
                        <nav class="cover-navigation cover-navigation--primary">
                            <ul class="navigation" style="display: flex; gap: 15px; list-style: none; padding: 0;">
                                <li class="navigation__item" style="display: inline-block;"><a href="javascript:void(0);" onclick="showBlogModal()" class="blog-button" style="display: inline-block; padding: 8px 16px; border: 1px solid rgba(255,255,255,0.5); text-decoration: none; font-size: 16px; border-radius: 8px; background: rgba(255,255,255,0.22); color: #ffffff;">博客</a></li>
                                <li class="navigation__item" style="display: inline-block;"><a href="javascript:void(0);" onclick="showToolModal()" class="blog-button" style="display: inline-block; padding: 8px 16px; border: 1px solid rgba(255,255,255,0.5); text-decoration: none; font-size: 16px; border-radius: 8px; background: rgba(255,255,255,0.22); color: #ffffff;">工具</a></li>
                                <li class="navigation__item" style="display: inline-block;"><a href="javascript:void(0);" onclick="showLinksModal()" class="blog-button" style="display: inline-block; padding: 8px 16px; border: 1px solid rgba(255,255,255,0.5); text-decoration: none; font-size: 16px; border-radius: 8px; background: rgba(255,255,255,0.22); color: #ffffff;">友链</a></li>
                                <li class="navigation__item" style="display: inline-block;"><a href="javascript:void(0);" onclick="showCallMeModal()" class="blog-button" style="display: inline-block; padding: 8px 16px; border: 1px solid rgba(255,255,255,0.5); text-decoration: none; font-size: 16px; border-radius: 8px; background: rgba(255,255,255,0.22); color: #ffffff;">Call Me</a></li>
                            </ul>

                        </nav>
                    </div>


                </div>
            </div>
            <div class="panel-cover--overlay cover-slate"></div>
        </div>
        <div class="copyright" style="position: absolute; bottom: 20px; left: 0; right: 0; text-align: center; color: #ffffff; font-size: 12px;">
            <p style="margin: 0;">
                © 2026 FFF. All Rights Reserved.<br>
                <span id="runtime" style="font-size: 12px;"></span>
            </p>
        </div>
    </header>
    
    <!-- QQ弹窗 -->
    <div id="qqModal" class="qq-modal">
        <div class="qq-modal-content">
            <span class="close-modal" onclick="closeQQModal()">&times;</span>
            <div class="qq-id">QQ</div>
            <div class="qq-qr">
                <img src="./assets/img/qq.jpg" alt="QQ二维码">
            </div>
            <button class="copy-btn" onclick="copyQQId()">复制QQ号</button>
        </div>
    </div>
    
    <!-- 邮箱弹窗 -->
    <div id="emailModal" class="qq-modal">
        <div class="qq-modal-content">
            <span class="close-modal" onclick="closeEmailModal()">&times;</span>
            <div class="qq-id">邮箱</div>
            <div style="font-weight: bold; color: #ffffff; margin-bottom: 20px; font-size: 16px;">2660238308@qq.com</div>
            <button class="copy-btn" onclick="copyEmail()">复制邮箱</button>
        </div>
    </div>
    
    <!-- 小程序弹窗 -->
    <div id="xcxModal" class="qq-modal">
        <div class="qq-modal-content">
            <span class="close-modal" onclick="closeXcxModal()">&times;</span>
            <div class="qq-id">微信小程序</div>
            <div class="qq-qr">
                <img src="./assets/img/wxxcx.jpg" alt="小程序码">
            </div>
        </div>
    </div>
    
    <!-- 公众号弹窗 -->
    <div id="gzhModal" class="qq-modal">
        <div class="qq-modal-content">
            <span class="close-modal" onclick="closeGzhModal()">&times;</span>
            <div class="qq-id">公众号</div>
            <div class="qq-qr">
                <img src="./assets/img/wxgzh.jpg" alt="公众号二维码">
            </div>
        </div>
    </div>
    
    <!-- Call Me 弹窗（联系菜单） -->
    <div id="callMeModal" class="qq-modal">
        <div class="qq-modal-content">
            <span class="close-modal" onclick="closeCallMeModal()">&times;</span>
            <div class="qq-id">联系方式</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px;">
                <a href="javascript:void(0);" onclick="closeCallMeModal();showQQModal();" class="tool-btn">QQ</a>
                <a href="javascript:void(0);" onclick="closeCallMeModal();showEmailModal();" class="tool-btn">邮箱</a>
                <a href="https://github.com/LIF1FFF" target="_blank" class="tool-btn">GitHub</a>
                <a href="javascript:void(0);" onclick="closeCallMeModal();showXcxModal();" class="tool-btn">微信小程序</a>
                <a href="javascript:void(0);" onclick="closeCallMeModal();showGzhModal();" class="tool-btn">公众号</a>
            </div>
        </div>
    </div>
    
    <!-- 友链弹窗 -->
    <div id="linksModal" class="qq-modal">
        <div class="qq-modal-content">
            <span class="close-modal" onclick="closeLinksModal()">&times;</span>
            <div class="qq-id">友情链接</div>
            <p style="font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 12px;">欢迎交换友链，请发送至 <span style="color: #4da6ff;">2660238308@qq.com</span></p>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px;">
                <a href="http://www.winapps.cc" target="_blank" class="tool-btn">共享资源站点</a>
            </div>
        </div>
    </div>
    
    <!-- 博客弹窗 -->
    <div id="blogModal" class="blog-modal">
        <div class="blog-modal-content">
            <div class="blog-modal-body" id="blogModalBody">
                <button class="blog-modal-close" onclick="closeBlogModal()">&times;</button>
                <div class="blog-modal-loading">加载中...</div>
                <iframe id="blogIframe" src="" style="display:none;" onload="onBlogIframeLoad()"></iframe>
            </div>
        </div>
    </div>
    
    <!-- 工具链接弹窗 -->
    <div id="toolModal" class="qq-modal">
        <div class="qq-modal-content">
            <span class="close-modal" onclick="closeToolModal()">&times;</span>
            <div class="qq-id">常用工具</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px;">
                <a href="https://dot.karing.app/client.html?tag=windows-installer-stable" class="tool-btn">Karing</a>
                <a href="https://kv.ffoo.top/admin" target="_blank" class="tool-btn">Cloudflare代理</a>
                <a href="https://central.github.com/deployments/desktop/desktop/latest/win32" target="_blank" class="tool-btn">GithubDesktop</a>
                <a href="https://github.com/robotze/GithubDesktopZhTool/releases" target="_blank" class="tool-btn">汉化工具</a>
                <a href="https://www.codebuddy.cn" target="_blank" class="tool-btn">codebuddy</a>
                <a href="https://music.ffoo.top" target="_blank" class="tool-btn">音乐</a>
                <a href="https://www.kkys03.com" target="_blank" class="tool-btn">可可影视</a>
            </div>
        </div>
    </div>
    
    <script>
        // 通用弹窗显示/关闭
        function showModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        // 各弹窗快捷函数
        function showQQModal() { showModal('qqModal'); }
        function closeQQModal() { closeModal('qqModal'); }
        function showLinksModal() { showModal('linksModal'); }
        function closeLinksModal() { closeModal('linksModal'); }
        function showToolModal() { showModal('toolModal'); }
        function closeToolModal() { closeModal('toolModal'); }
        function showCallMeModal() { showModal('callMeModal'); }
        function closeCallMeModal() { closeModal('callMeModal'); }
        function showEmailModal() { showModal('emailModal'); }
        function closeEmailModal() { closeModal('emailModal'); }
        function showXcxModal() { showModal('xcxModal'); }
        function closeXcxModal() { closeModal('xcxModal'); }
        function showGzhModal() { showModal('gzhModal'); }
        function closeGzhModal() { closeModal('gzhModal'); }
        
        // 博客弹窗
        var blogIframeLoaded = false;
        // ====== 博客地址配置 ======
        // 本地开发用相对路径，部署时改为你的博客域名（如 'https://blog.ffoo.top/'）
        var BLOG_URL = '../Blog/index.html';
        function showBlogModal() {
            var modal = document.getElementById('blogModal');
            modal.style.display = 'block';
            if (!blogIframeLoaded) {
                var iframe = document.getElementById('blogIframe');
                iframe.src = BLOG_URL;
            }
        }
        function closeBlogModal() {
            document.getElementById('blogModal').style.display = 'none';
        }
        function onBlogIframeLoad() {
            blogIframeLoaded = true;
            document.getElementById('blogIframe').style.display = '';
            var loadingEl = document.querySelector('.blog-modal-loading');
            if (loadingEl) loadingEl.style.display = 'none';
        }
        

        // 复制QQ号
        function copyQQId() {
            var id = '2660238308';
            if (navigator.clipboard) {
                navigator.clipboard.writeText(id).then(function() { alert('QQ号已复制: ' + id); closeQQModal(); });
            } else {
                var ta = document.createElement('textarea');
                ta.value = id; document.body.appendChild(ta); ta.select();
                document.execCommand('copy'); document.body.removeChild(ta);
                alert('QQ号已复制: ' + id); closeQQModal();
            }
        }
        
        // 复制邮箱
        function copyEmail() {
            var email = '2660238308@qq.com';
            if (navigator.clipboard) {
                navigator.clipboard.writeText(email).then(function() { alert('邮箱已复制: ' + email); closeEmailModal(); });
            } else {
                var ta = document.createElement('textarea');
                ta.value = email; document.body.appendChild(ta); ta.select();
                document.execCommand('copy'); document.body.removeChild(ta);
                alert('邮箱已复制: ' + email); closeEmailModal();
            }
        }
        
        // 点击弹窗外部关闭
        window.onclick = function(e) {
            ['qqModal','linksModal','toolModal','callMeModal','emailModal','xcxModal','gzhModal'].forEach(function(id) {
                if (e.target == document.getElementById(id)) closeModal(id);
            });
            // 博客弹窗点击外部关闭
            if (e.target == document.getElementById('blogModal')) {
                closeBlogModal();
            }
        }
        
        // 网站运行时长计时
        function showRuntime() {
            const startTime = new Date('2020-12-01 00:00:00');
            const now = new Date();
            const diff = now - startTime;
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            const runtimeElement = document.getElementById('runtime');
            if (runtimeElement) {
                runtimeElement.textContent = `网站已运行 ${days} 天 ${hours} 小时 ${minutes} 分钟 ${seconds} 秒`;
            }
        }
        
        // 页面加载后立即显示并每秒更新
        showRuntime();
        setInterval(showRuntime, 1000);
        
        // 禁止调出开发者控制台
        // 禁止右键菜单
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });
        
        // 禁止F12、Ctrl+Shift+I、Ctrl+Shift+J、Ctrl+U等快捷键
        document.addEventListener('keydown', function(e) {
            // F12
            if (e.keyCode === 123) {
                e.preventDefault();
            }
            // Ctrl+Shift+I
            if (e.ctrlKey && e.shiftKey && e.keyCode === 73) {
                e.preventDefault();
            }
            // Ctrl+Shift+J
            if (e.ctrlKey && e.shiftKey && e.keyCode === 74) {
                e.preventDefault();
            }
            // Ctrl+U
            if (e.ctrlKey && e.keyCode === 85) {
                e.preventDefault();
            }
        });
    </script>
    <!-- 使用本地JavaScript文件替代CDN，减少网络请求 -->
    <script type="text/javascript" src="./assets/js/jquery.min.js" defer></script>
    <script type="text/javascript" src="./assets/js/main.js" defer></script>
</body>
</html>
