<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安装 反反的小世界</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #3b82f6, #07c160);
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: #fff;
            font-weight: 700;
        }

        h1 {
            font-size: 22px;
            color: #e2e8f0;
            margin-bottom: 6px;
        }

        .subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 28px;
        }

        .install-btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
            margin-bottom: 20px;
        }

        .install-btn:hover { background: #2563eb; }

        .steps {
            text-align: left;
            background: #0f172a;
            border-radius: 12px;
            padding: 20px;
        }

        .steps h3 {
            color: #94a3b8;
            font-size: 13px;
            margin-bottom: 12px;
        }

        .steps ol {
            list-style-position: inside;
            color: #94a3b8;
            font-size: 13px;
            line-height: 2;
        }

        .steps ol li {
            padding-left: 4px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">FFF</div>
        <h1>反反的小世界</h1>
        <p class="subtitle">FFOO.TOP</p>

        <a class="install-btn" href="ffoo_top.mobileconfig">安装到主屏幕</a>

        <div class="steps">
            <h3>安装步骤</h3>
            <ol>
                <li>点击上方「安装到主屏幕」按钮</li>
                <li>弹出提示后，点击「允许」下载描述文件</li>
                <li>打开 <strong>设置 → 通用 → VPN与设备管理</strong></li>
                <li>找到「反反的小世界」描述文件，点击安装</li>
                <li>返回桌面即可看到 反反的小世界 图标</li>
            </ol>
        </div>
    </div>
</body>
</html>
